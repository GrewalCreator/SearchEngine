<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Engine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="header" class="hidden">
      <button id="header-logo" type="button">Search</button>

      <div id="header-search">
        <input
          type="text"
          id="header-query"
          placeholder="Search..."
          autocomplete="off"
        />
        <button id="header-btn" type="button">Search</button>
      </div>

      <div id="header-controls">
        <div class="control-group">
          <label for="header-dataset">Dataset</label>
          <select id="header-dataset">
            <option value="fruitsA">Fruits</option>
            <option value="personal">Personal</option>
          </select>
        </div>

        <div class="control-group">
          <label class="checkbox-label">
            <input type="checkbox" id="header-boost" checked />
            <span>Boost</span>
          </label>
        </div>

        <div class="control-group">
          <label for="header-limit">Results</label>
          <select id="header-limit">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
        </div>
      </div>
    </header>

    <main id="home">
      <div id="logo-area">
        <div id="logo">Search</div>
        <p id="tagline">Find anything across your datasets</p>
      </div>

      <div id="search-bar">
        <input
          type="text"
          id="query"
          placeholder="Type your search query..."
          autocomplete="off"
        />
        <button id="search-btn" type="button">Search</button>
      </div>

      <div id="controls">
        <div class="control-group">
          <label for="dataset">Dataset</label>
          <select id="dataset">
            <option value="fruitsA">Fruits</option>
            <option value="personal">Personal</option>
          </select>
        </div>

        <div class="control-group">
          <label class="checkbox-label">
            <input type="checkbox" id="boost" checked />
            <span>Boost results</span>
          </label>
        </div>

        <div class="control-group">
          <label for="limit">Results</label>
          <select id="limit">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
          </select>
        </div>
      </div>
    </main>

    <section id="results-section" class="hidden">
      <div id="results-info"></div>
      <div id="results"></div>
    </section>

    <div id="modal-overlay" class="hidden">
      <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button id="modal-close" type="button" aria-label="Close modal">&times;</button>
        <div id="modal-content"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
